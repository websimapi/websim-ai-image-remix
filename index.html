<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Remix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Image Remix</h1>
            <p>Upload an image and describe the changes you want to see.</p>
        </header>
        
        <main class="main-content">
            <div class="input-section">
                <div class="upload-step">
                    <h2>1. Upload Your Image</h2>
                    <label for="image-upload" class="upload-label">
                        <img id="upload-icon" src="upload-icon.png" alt="Upload Icon">
                        <span>Choose an image...</span>
                    </label>
                    <input type="file" id="image-upload" accept="image/*" hidden>
                    <div class="image-preview-container">
                        <img id="image-preview" src="" alt="Image preview">
                        <span id="preview-text">Image Preview</span>
                    </div>
                </div>

                <div class="prompt-step">
                    <h2>2. Describe Changes</h2>
                    <textarea id="prompt-input" rows="4" placeholder="e.g., 'make it a Picasso painting', 'add a cat wearing a hat', 'turn the season to winter'"></textarea>
                </div>

                <button id="generate-btn">Generate Image</button>
            </div>

            <div class="output-section">
                <h2>Result</h2>
                <div id="result-container">
                    <div id="loader" class="hidden"></div>
                    <img id="result-image" src="" alt="Generated image">
                    <span id="result-placeholder">Your generated image will appear here.</span>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
